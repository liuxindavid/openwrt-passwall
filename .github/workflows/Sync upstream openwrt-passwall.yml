name: Sync upstream passwall

on:
  workflow_dispatch:
  schedule:
    - cron: '17 18 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream but keep local workflows
        run: |
          set -eux

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream || true
          git remote add upstream https://github.com/Openwrt-Passwall/openwrt-passwall.git

          git fetch upstream --prune

          # 用上游 main 内容覆盖当前工作区，但保留本地 .github/workflows
          git checkout upstream/main -- . ':(exclude).github/workflows'

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync upstream passwall"
          fi

          git push origin HEAD:main
