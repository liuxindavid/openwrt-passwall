name: Sync upstream passwall

on:
  workflow_dispatch:
  schedule:
    - cron: '17 18 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_GH_TOKEN }}

      - name: Sync from upstream but keep local workflows
        env:
          GH_TOKEN: ${{ secrets.MY_GH_TOKEN }}
        run: |
          set -eux
          git config user.name "liuxindavid"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream || true
          git remote add upstream https://github.com/Openwrt-Passwall/openwrt-passwall.git

          git fetch upstream --prune
          git fetch upstream --tags --force

          # 用上游内容覆盖工作区，但排除本地 workflows
          git checkout upstream/main -- . ':(exclude).github/workflows'

          git add -A
          git commit -m "Sync upstream passwall" || true

          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git push origin HEAD:main
          git push origin --tags --force
